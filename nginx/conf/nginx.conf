# ============================================
# NGINX ANTI-DDOS REVERSE PROXY CONFIG
# Para usar com OpenResty (Nginx + LuaJIT)
# ============================================
# Copie este arquivo e a pasta lua/ para o seu OpenResty/Nginx
# docker run -p 80:80 -v $PWD/nginx:/etc/nginx openresty/openresty

worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ============================================
    # ANTI-DDOS LUA SHARED MEMORY ZONES
    # ============================================
    lua_shared_dict antiddos 70m;
    lua_shared_dict antiddos_blocked 70m;
    lua_shared_dict ddos_counter 10m;
    lua_shared_dict jspuzzle_tracker 70m;

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ============================================
    # UPSTREAM BACKENDS
    # ============================================
    upstream backend_api {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    upstream frontend_app {
        server 127.0.0.1:3000;
        keepalive 16;
    }

    # ============================================
    # MAIN SERVER BLOCK
    # ============================================
    server {
        listen 80;
        server_name _;

        # Anti-DDoS Lua challenge (inspirado no Cloudflare)
        access_by_lua_file /etc/nginx/lua/anti_ddos_challenge.lua;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' http://127.0.0.1:8000 https://api.telegram.org;" always;

        # Block common bad bots
        if ($http_user_agent ~* (bot|crawl|spider|scan|harvest|extract|grab|scrape)) {
            return 403;
        }

        # Rate limit na API
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 30;

            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;
        }

        # WebSocket support
        location /ws {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend (React)
        location / {
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Disable caching for dev
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # Block dangerous file extensions
        location ~* \.(php|cgi|pl|py|sh|bash|exe|bat|cmd|com|inf|dll)$ {
            deny all;
            return 403;
        }

        # Custom error pages
        error_page 429 /429.html;
        location = /429.html {
            internal;
            return 429 '{"error": "Rate limit exceeded. Try again later."}';
        }

        error_page 403 /403.html;
        location = /403.html {
            internal;
            return 403 '{"error": "Access forbidden."}';
        }
    }
}
